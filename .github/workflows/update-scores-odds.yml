name: Update Scores

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Update scores + highlights via Firebase REST API
        run: |
          node << 'SCRIPT'
          const API_KEY    = process.env.FOOTBALL_API_KEY;
          const YT_KEY     = process.env.YOUTUBE_API_KEY;
          const FB_URL     = process.env.FIREBASE_DATABASE_URL;
          const WC_TEAMS   = [2,6,7,9,10,13,15,21,24,26,27,29,30,31,34,38,46,48,56,92,114,762];
          const RAF_ID     = 111;
          const L2_ID      = 61;

          // ── Firebase Auth ──────────────────────────────
          async function getToken() {
            const sa = JSON.parse(process.env.FIREBASE_SA);
            const now = Math.floor(Date.now()/1000);
            const header  = Buffer.from(JSON.stringify({alg:"RS256",typ:"JWT"})).toString("base64url");
            const payload = Buffer.from(JSON.stringify({
              iss: sa.client_email, sub: sa.client_email,
              aud: "https://oauth2.googleapis.com/token",
              iat: now, exp: now+3600,
              scope: "https://www.googleapis.com/auth/firebase.database https://www.googleapis.com/auth/userinfo.email"
            })).toString("base64url");
            const { createSign } = await import("crypto");
            const sign = createSign("RSA-SHA256");
            sign.update(`${header}.${payload}`);
            const sig = sign.sign(sa.private_key, "base64url");
            const jwt = `${header}.${payload}.${sig}`;
            const res = await fetch("https://oauth2.googleapis.com/token", {
              method:"POST", headers:{"Content-Type":"application/x-www-form-urlencoded"},
              body:`grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=${jwt}`
            });
            const d = await res.json();
            if (!d.access_token) throw new Error("Token error: " + JSON.stringify(d));
            return d.access_token;
          }

          async function fbSet(token, path, data) {
            const r = await fetch(`${FB_URL}/${path}.json?access_token=${token}`, {
              method:"PUT", headers:{"Content-Type":"application/json"},
              body: JSON.stringify(data)
            });
            console.log(`Firebase ${path}: ${r.status}`);
          }

          async function fbGet(token, path) {
            const r = await fetch(`${FB_URL}/${path}.json?access_token=${token}`);
            return r.ok ? await r.json() : null;
          }

          // ── API Football ───────────────────────────────
          async function api(endpoint) {
            const r = await fetch(`https://v3.football.api-sports.io/${endpoint}`, {
              headers: { "x-apisports-key": API_KEY }
            });
            const d = await r.json();
            return d.response || [];
          }

          // ── YouTube Search ─────────────────────────────
          async function searchYoutube(query) {
            const q = encodeURIComponent(query);
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${q}&type=video&maxResults=3&relevanceLanguage=fr&key=${YT_KEY}`;
            console.log("YouTube search:", query);
            const r = await fetch(url);
            const d = await r.json();
            if (d.error) { console.log("YouTube error:", d.error.message); return null; }
            const items = d.items || [];
            // Prioritise les vidéos avec "highlight" ou "but" dans le titre
            const best = items.find(v =>
              v.snippet.title.toLowerCase().includes("highlight") ||
              v.snippet.title.toLowerCase().includes("but") ||
              v.snippet.title.toLowerCase().includes("goal") ||
              v.snippet.title.toLowerCase().includes("resume")
            ) || items[0];
            return best ? best.id.videoId : null;
          }

          function fmtDate(iso) {
            return new Date(iso).toLocaleDateString("fr-FR",{
              weekday:"short",day:"numeric",month:"short",
              hour:"2-digit",minute:"2-digit",timeZone:"Europe/Paris"
            });
          }
          function getStatus(f) {
            const s = f.fixture.status.short;
            if(["NS","TBD"].includes(s)) return "future";
            if(["FT","AET","PEN"].includes(s)) return "done";
            return "live";
          }

          async function main() {
            console.log("=== START ===");
            const token = await getToken();
            console.log("Token OK");

            // ── Amicaux ────────────────────────────────
            const today = new Date();
            const from = new Date(today); from.setDate(today.getDate()-10);
            const to   = new Date(today); to.setDate(today.getDate()+45);
            const fmt  = d => d.toISOString().split("T")[0];
            const seen = new Set();
            const amicaux = [];
            for(const season of [2025, 2026]) {
              const fixes = await api(`fixtures?league=10&season=${season}&from=${fmt(from)}&to=${fmt(to)}`);
              for(const f of fixes) {
                if(!WC_TEAMS.includes(f.teams.home.id) && !WC_TEAMS.includes(f.teams.away.id)) continue;
                const key = `f${f.fixture.id}`;
                if(seen.has(key)) continue;
                seen.add(key);
                const st = getStatus(f);
                amicaux.push({
                  id:key, home:f.teams.home.name, hL:f.teams.home.logo,
                  away:f.teams.away.name, aL:f.teams.away.logo,
                  date:fmtDate(f.fixture.date), venue:f.fixture.venue?.name||"",
                  status:st, score:st==="future"?null:{h:f.goals.home??0,a:f.goals.away??0}
                });
              }
            }
            console.log(`Amicaux: ${amicaux.length}`);

            // ── Highlights YouTube pour matchs terminés ──
            // Récupère les highlights existants depuis Firebase
            const existingHighlights = await fbGet(token, "highlights") || {};
            const newHighlights = {...existingHighlights};

            for(const m of amicaux) {
              if(m.status === "done" && !newHighlights[m.id]) {
                const year = new Date().getFullYear();
                const query = `${m.home} ${m.away} highlights ${year}`;
                const videoId = await searchYoutube(query);
                if(videoId) {
                  newHighlights[m.id] = videoId;
                  console.log(`Highlight ${m.id}: ${videoId}`);
                }
                // Pause pour éviter de dépasser le quota YouTube
                await new Promise(r => setTimeout(r, 500));
              }
            }

            // ── RAF matchs ─────────────────────────────
            let rec = [], nxt = [];
            for(const season of [2024, 2025]) {
              if(rec.length === 0) rec = await api(`fixtures?team=${RAF_ID}&league=${L2_ID}&season=${season}&last=5`);
              if(nxt.length === 0) nxt = await api(`fixtures?team=${RAF_ID}&league=${L2_ID}&season=${season}&next=5`);
            }

            const toM = (f,type) => {
              const st = type==="next"?"future":getStatus(f);
              const hG=f.goals.home??0, aG=f.goals.away??0;
              const isH=f.teams.home.name.toLowerCase().includes("rodez");
              const res=st==="future"?null:hG>aG?(isH?"V":"D"):hG<aG?(isH?"D":"V"):"N";
              return {
                id:`r${f.fixture.id}`,
                journee:`J${(f.league.round||"").replace("Regular Season - ","")}`,
                home:f.teams.home.name, hL:f.teams.home.logo,
                away:f.teams.away.name, aL:f.teams.away.logo,
                date:fmtDate(f.fixture.date), venue:f.fixture.venue?.name||"",
                status:st, score:st==="future"?null:{h:hG,a:aG}, result:res
              };
            };

            // Highlights pour matchs RAF terminés
            for(const m of rec) {
              const rm = toM(m, "done");
              if(!newHighlights[rm.id]) {
                const year = new Date().getFullYear();
                const query = `Rodez ${rm.away.replace("Rodez AF","")} Ligue 2 highlights ${year}`;
                const videoId = await searchYoutube(query);
                if(videoId) {
                  newHighlights[rm.id] = videoId;
                  console.log(`RAF Highlight ${rm.id}: ${videoId}`);
                }
                await new Promise(r => setTimeout(r, 500));
              }
            }

            // ── Classement L2 ──────────────────────────
            let rows = [];
            for(const season of [2024, 2025]) {
              if(rows.length === 0) {
                const data = await api(`standings?league=${L2_ID}&season=${season}`);
                rows = data[0]?.league?.standings?.[0] || [];
              }
            }
            const classL2 = rows.map(t=>({
              pos:t.rank, team:t.team.name, logo:t.team.logo,
              pts:t.points, j:t.all.played, v:t.all.win, n:t.all.draw, d:t.all.lose,
              bp:t.all.goals.for, bc:t.all.goals.against, diff:t.goalsDiff, isRAF:t.team.id===RAF_ID
            }));
            const raf = rows.find(t=>t.team.id===RAF_ID);
            const rafStats = raf ? {
              pos:raf.rank, pts:raf.points, j:raf.all.played,
              v:raf.all.win, n:raf.all.draw, d:raf.all.lose,
              bp:raf.all.goals.for, bc:raf.all.goals.against
            } : null;
            console.log(`L2: ${classL2.length} équipes, RAF: ${rafStats?.pos}e`);
            console.log(`Highlights total: ${Object.keys(newHighlights).length}`);

            // ── Ecriture Firebase ──────────────────────
            const now = new Date().toLocaleString("fr-FR",{timeZone:"Europe/Paris"});
            await Promise.all([
              amicaux.length   ? fbSet(token, "amicaux",        amicaux)              : Promise.resolve(),
              fbSet(token, "raf/recents",    rec.map(f=>toM(f,"done"))),
              fbSet(token, "raf/prochains",  nxt.map(f=>toM(f,"next"))),
              rafStats         ? fbSet(token, "raf/classement",  rafStats)             : Promise.resolve(),
              classL2.length   ? fbSet(token, "classementL2",    classL2)             : Promise.resolve(),
              Object.keys(newHighlights).length ? fbSet(token, "highlights", newHighlights) : Promise.resolve(),
              fbSet(token, "meta", {lastUpdate:now}),
            ]);
            console.log("=== DONE ===", now);
          }

          main().catch(e => { console.error("ERROR:", e.message); process.exit(1); });
          SCRIPT
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

  odds:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch odds via The Odds API
        run: |
          node << 'SCRIPT'
          const ODDS_KEY = process.env.ODDS_API_KEY;
          const FB_URL   = process.env.FIREBASE_DATABASE_URL;

          async function getToken() {
            const sa = JSON.parse(process.env.FIREBASE_SA);
            const now = Math.floor(Date.now()/1000);
            const header  = Buffer.from(JSON.stringify({alg:"RS256",typ:"JWT"})).toString("base64url");
            const payload = Buffer.from(JSON.stringify({
              iss: sa.client_email, sub: sa.client_email,
              aud: "https://oauth2.googleapis.com/token",
              iat: now, exp: now+3600,
              scope: "https://www.googleapis.com/auth/firebase.database https://www.googleapis.com/auth/userinfo.email"
            })).toString("base64url");
            const { createSign } = await import("crypto");
            const sign = createSign("RSA-SHA256");
            sign.update(`${header}.${payload}`);
            const sig = sign.sign(sa.private_key, "base64url");
            const jwt = `${header}.${payload}.${sig}`;
            const res = await fetch("https://oauth2.googleapis.com/token", {
              method:"POST", headers:{"Content-Type":"application/x-www-form-urlencoded"},
              body:`grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=${jwt}`
            });
            const d = await res.json();
            if (!d.access_token) throw new Error("Token error: " + JSON.stringify(d));
            return d.access_token;
          }

          async function fbSet(token, path, data) {
            const r = await fetch(`${FB_URL}/${path}.json?access_token=${token}`, {
              method:"PUT", headers:{"Content-Type":"application/json"},
              body: JSON.stringify(data)
            });
            console.log(`Firebase ${path}: ${r.status}`);
          }

          async function main() {
            console.log("=== ODDS START ===");
            const token = await getToken();

            // Récupère les sports disponibles
            // soccer_france_ligue_2 et soccer_international_friendlies
            const sports = ["soccer_france_ligue_2", "soccer_international_friendlies"];
            const odds = {};

            for (const sport of sports) {
              console.log(`Fetching odds for ${sport}...`);
              const url = `https://api.the-odds-api.com/v4/sports/${sport}/odds/?apiKey=${ODDS_KEY}&regions=eu&markets=h2h&oddsFormat=decimal`;
              const r = await fetch(url);
              const remaining = r.headers.get("x-requests-remaining");
              console.log(`Requests remaining: ${remaining}`);
              if (!r.ok) { console.log(`Error ${r.status}`); continue; }
              const games = await r.json();
              console.log(`${sport}: ${games.length} matchs`);

              for (const g of games) {
                // Prend les cotes du premier bookmaker dispo
                const bk = g.bookmakers?.[0];
                if (!bk) continue;
                const h2h = bk.markets?.find(m => m.key === "h2h");
                if (!h2h) continue;
                const outcomes = h2h.outcomes;
                const home = outcomes.find(o => o.name === g.home_team);
                const away = outcomes.find(o => o.name === g.away_team);
                const draw = outcomes.find(o => o.name === "Draw");

                // Clé = home_away normalisé
                const key = `${g.home_team}_${g.away_team}`.replace(/\s+/g,"-").toLowerCase().slice(0,60);
                odds[key] = {
                  home:  home?.price  || null,
                  draw:  draw?.price  || null,
                  away:  away?.price  || null,
                  homeTeam: g.home_team,
                  awayTeam: g.away_team,
                  commence: g.commence_time,
                  id: g.id,
                };
              }
            }

            console.log(`Total cotes: ${Object.keys(odds).length} matchs`);
            if (Object.keys(odds).length > 0) {
              await fbSet(token, "odds", odds);
            }
            console.log("=== ODDS DONE ===");
          }

          main().catch(e => { console.error("ERROR:", e.message); process.exit(1); });
          SCRIPT
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
